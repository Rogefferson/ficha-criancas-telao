<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Chamar Responsáveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0f11;
      --surface: #17191d;
      --surface2: #1f2227;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      --text: #f0f0f0;
      --muted: #6b7280;
      --green: #22d3a5;
      --green-dim: rgba(34, 211, 165, 0.12);
      --green-glow: rgba(34, 211, 165, 0.25);
      --blue: #60a5fa;
      --blue-dim: rgba(96, 165, 250, 0.12);
      --blue-glow: rgba(96, 165, 250, 0.25);
      --red: #f87171;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .header {
      padding: 24px 24px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
    }

    .logo-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 24px;
      gap: 28px;
    }

    .hero {
      padding-bottom: 8px;
    }

    .hero h1 {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .hero p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .area-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .area-btn {
      position: relative;
      padding: 18px 12px;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .area-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .area-btn.bercario::before {
      background: var(--green-dim);
    }

    .area-btn.di::before {
      background: var(--blue-dim);
    }

    .area-btn.selected.bercario {
      border-color: var(--green);
      box-shadow: 0 0 0 1px var(--green), 0 4px 24px var(--green-glow);
    }

    .area-btn.selected.di {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px var(--blue), 0 4px 24px var(--blue-glow);
    }

    .area-btn.selected::before {
      opacity: 1;
    }

    .area-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
      position: relative;
    }

    .area-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: block;
      position: relative;
    }

    .area-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      display: block;
      position: relative;
    }

    .area-btn.selected.bercario .area-name {
      color: var(--green);
    }

    .area-btn.selected.di .area-name {
      color: var(--blue);
    }

    .num-section {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .num-display {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      background: var(--surface);
      border-radius: 20px;
      border: 1.5px solid var(--border);
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .num-display.has-num {
      border-color: var(--border-hover);
    }

    .num-value {
      font-family: var(--mono);
      font-size: 56px;
      font-weight: 500;
      letter-spacing: 6px;
      color: var(--text);
      transition: all 0.15s;
      min-height: 68px;
      display: flex;
      align-items: center;
    }

    .num-value.empty {
      font-size: 32px;
      color: var(--muted);
      letter-spacing: 12px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .key {
      aspect-ratio: 1.3;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      user-select: none;
      touch-action: manipulation;
    }

    .key:active {
      transform: scale(0.93);
      background: var(--surface2);
    }

    .key.del {
      font-size: 18px;
      color: var(--muted);
    }

    .key.zero {
      grid-column: 2;
    }

    .send-btn {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      border: none;
      background: var(--green);
      color: #0a1a14;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 12px;
      letter-spacing: -0.01em;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .send-btn:disabled {
      background: var(--surface2);
      color: var(--muted);
      cursor: not-allowed;
    }

    .send-btn:not(:disabled):active {
      transform: scale(0.97);
      box-shadow: 0 0 30px var(--green-glow);
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      color: var(--green);
      border-color: var(--green);
    }

    .toast.error {
      color: var(--red);
      border-color: var(--red);
    }

    .dot-ok {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .config-warning {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fbbf24;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo-dot"></div>
    <span class="logo-text">Kids Call</span>
  </div>

  <div class="main">
    <div class="hero">
      <h1>Chamar Responsáveis</h1>
      <p>Selecione a área e informe o número da fixa</p>
    </div>

    <div>
      <p class="section-label">Área</p>
      <div class="area-grid">
        <button class="area-btn bercario" onclick="selectArea('Berçário')" id="btn-bercario">
          <span class="area-icon">🍼</span>
          <span class="area-name">Berçário</span>
        </button>
        <button class="area-btn di" onclick="selectArea('DI')" id="btn-di">
          <span class="area-icon">🧸</span>
          <span class="area-name">DI</span>
        </button>
      </div>
    </div>

    <div class="num-section">
      <p class="section-label">Número da ficha</p>
      <div class="num-display" id="num-display">
        <div class="num-value empty" id="num-value">· · ·</div>
      </div>

      <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key del" onclick="deleteLast()">⌫</button>
        <button class="key zero" onclick="pressKey('0')">0</button>
        <button class="key" onclick="clearNum()" style="font-size:13px; color:var(--muted)">Limpar</button>
      </div>

      <button class="send-btn" id="send-btn" disabled onclick="enviar()">
        Chamar Responsáveis
      </button>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="dot-ok"></div>
    <span id="toast-msg">Chamada enviada!</span>
  </div>

  <script>
    // =============================================
    // CONFIGURAÇÃO SUPABASE — edite aqui
    // =============================================
    const SUPABASE_URL = 'https://uyilxlqdihrdvrnadvvs.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5aWx4bHFkaWhyZHZybmFkdnZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDM4NDYsImV4cCI6MjA5MjIxOTg0Nn0.KX2s5tcr8UgBzL57EkVbp6-iZl7wvfBwcz-3BWQm510'
    // =============================================

    let supabaseClient = null
    let area = null
    let numero = ''

    function initSupabase() {
      if (SUPABASE_URL === 'https://uyilxlqdihrdvrnadvvs.supabase.co') {
        document.getElementById('config-warning').style.display = 'block'
        return
      }
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    }

    function selectArea(a) {
      area = a
      document.getElementById('btn-bercario').classList.toggle('selected', a === 'Berçário')
      document.getElementById('btn-di').classList.toggle('selected', a === 'DI')
      updateSend()
    }

    function pressKey(k) {
      if (numero.length >= 3) return
      numero += k
      updateDisplay()
    }

    function deleteLast() {
      numero = numero.slice(0, -1)
      updateDisplay()
    }

    function clearNum() {
      numero = ''
      updateDisplay()
    }

    function updateDisplay() {
      const el = document.getElementById('num-value')
      const display = document.getElementById('num-display')
      if (numero) {
        el.textContent = numero
        el.classList.remove('empty')
        display.classList.add('has-num')
      } else {
        el.textContent = '· · ·'
        el.classList.add('empty')
        display.classList.remove('has-num')
      }
      updateSend()
    }

    function updateSend() {
      document.getElementById('send-btn').disabled = !(area && numero)
    }

    async function enviar() {
      if (!area || !numero) return

      const btn = document.getElementById('send-btn')
      btn.disabled = true
      btn.textContent = 'Enviando...'

      try {
        if (!supabaseClient) throw new Error('Supabase não configurado')

        const { error } = await supabaseClient
          .from('chamadas')
          .insert({ area, numero, ativa: true })

        if (error) throw error

        showToast(`${area} ${numero} — enviado!`, 'success')
        area = null
        numero = ''
        document.getElementById('btn-bercario').classList.remove('selected')
        document.getElementById('btn-di').classList.remove('selected')
        updateDisplay()
      } catch (e) {
        console.error(e)
        showToast('Erro ao enviar. Verifique a conexão.', 'error')
      }

      btn.textContent = 'Chamar Responsáveis'
      updateSend()
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast')
      document.getElementById('toast-msg').textContent = msg
      t.className = `toast ${type} show`
      setTimeout(() => t.className = `toast ${type}`, 3000)
    }

    initSupabase()
  </script>
</body>

</html>
